on:
  workflow_dispatch:
  pull_request:
    types: [ labeled ]
  push:
    branches:
      - main
    paths:
      - "**/*.swift"
      - ".github/workflows/build-swift.yml"
      - "gen-swift-bindings.sh"

name: Build Swift
jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.label.name ==
      'generate-bindings'
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.ref || '' }}

      - name: Select Xcode 26.4
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: Build Swift
        run: bash gen-swift-bindings.sh

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          go-download-base-url: "https://aka.ms/golang/release/latest"

      - name: Run go generate
        run: go generate ./...
        env:
          MS_GO_NOSYSTEMCRYPTO: "1" # Disable systemcrypto to avoid duplicate-symbol/object-file linker errors during go generate

      - name: Commit and Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --global user.name "GitHub Actions"

          git add internal/cryptokit/CryptoKit*.syso
          git add internal/cryptokit/zcryptokit_swift_*.go
          git add internal/cryptokit/xcodebuild_version.txt

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git add internal/cryptokit/zcryptokit.h
            COMMIT_MSG="Regenerate bindings"
          else
            COMMIT_MSG="Update CryptoKit Object files"
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "$COMMIT_MSG"

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git push
            echo "Triggering test workflow..."
            gh workflow run test.yml --ref ${{ github.head_ref }}
          else
            BRANCH=autogen/update-cryptokit-obj-$(date +%s)
            git checkout -b $BRANCH
            git push origin $BRANCH

            REPO_URL="${{ github.server_url }}/${{ github.repository }}"
            ENCODED_BRANCH=$(printf '%s' "$BRANCH" | sed 's/\//%2F/g')
            PR_URL="${REPO_URL}/compare/main...${ENCODED_BRANCH}?expand=1&title=Update%20CryptoKit%20Object%20files"

            ISSUE_BODY=$(cat <<EOF
          CryptoKit object files have been updated and pushed to branch \`${BRANCH}\`.

          **[Click here to create the PR](${PR_URL})**

          This issue will be closed automatically when the PR is merged.

          ---
          _Automated by the Build Swift workflow, run [#${{ github.run_number }}](${REPO_URL}/actions/runs/${{ github.run_id }})._
          EOF
            )

            ISSUE_URL=$(gh issue create \
              --title "Update CryptoKit Object files (${BRANCH})" \
              --body "$ISSUE_BODY" \
              --label "automated")

            echo "Created issue: $ISSUE_URL"
          fi
