name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: 42 3 * * 4

jobs:
  analyze:
    name: Analyze
    # Runner size impacts CodeQL analysis time. To learn more, please see:
    #   - https://gh.io/recommended-hardware-resources-for-running-codeql
    #   - https://gh.io/supported-runners-and-hardware-resources
    #   - https://gh.io/using-larger-runners
    # Consider using larger runners for possible analysis time improvements.
    runs-on: macos-26
    timeout-minutes: 360
    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      matrix:
        language: [go, swift, cpp]

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up environment for Go
        if: matrix.language == 'go'
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26"
          go-download-base-url: "https://aka.ms/golang/release/latest"

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        if: matrix.language != 'cpp'
        uses: github/codeql-action/autobuild@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1

      - name: Build dummy C file for CodeQL
        if: matrix.language == 'cpp'
        run: |
          clang -c internal/cryptokit/zcryptokit.c  -o internal/cryptokit/zcryptokit.o
          clang -c internal/commoncrypto/zcommoncrypto.c  -o internal/cryptokit/zcommoncrypto.o
          clang -c internal/security/zsecurity.c  -o internal/cryptokit/zsecurity.o

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: /language:${{ matrix.language }}
