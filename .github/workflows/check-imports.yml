on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

name: Check Vendored Imports
permissions:
  contents: read
jobs:
  check-imports:
    # Verify that packages vendored into Go's standard library only use
    # allowed stdlib imports. New imports require a matching update to the
    # deps_test.go patch in microsoft-go.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          go-download-base-url: "https://aka.ms/golang/release/latest"

      - name: Check vendored package imports
        run: |
          CGO_ENABLED=0 go run github.com/microsoft/go-infra/cmd/check-imports@v0.0.12 \
            -pkg ./internal/fakecgo \
            -allow syscall,unsafe \
            -pkg ./internal/xsyscall \
            -allow unsafe \
            -pkg ./internal/commoncrypto \
            -allow runtime,unsafe \
            -pkg ./internal/cryptokit \
            -allow runtime,unsafe \
            -pkg ./internal/security \
            -allow runtime,unsafe \
            -pkg ./bbig \
            -allow math/big \
            -pkg ./xcrypto
