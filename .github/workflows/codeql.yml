name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: 42 3 * * 4

jobs:
  analyze:
    name: Analyze
    # Runner size impacts CodeQL analysis time. To learn more, please see:
    #   - https://gh.io/recommended-hardware-resources-for-running-codeql
    #   - https://gh.io/supported-runners-and-hardware-resources
    #   - https://gh.io/using-larger-runners
    # Consider using larger runners for possible analysis time improvements.
    runs-on: macos-26
    timeout-minutes: 360
    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      matrix:
        language: [go, swift, cpp]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up environment for Go
        if: matrix.language == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          go-download-base-url: "https://aka.ms/golang/release/latest"

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          languages: ${{ matrix.language }}

      - name: Select Xcode 26.4
        if: matrix.language == 'swift'
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: Autobuild
        if: matrix.language != 'cpp'
        uses: github/codeql-action/autobuild@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3

      - name: Build dummy C file for CodeQL
        if: matrix.language == 'cpp'
        run: |
          clang -c internal/cryptokit/zcryptokit.c  -o internal/cryptokit/zcryptokit.o
          clang -c internal/commoncrypto/zcommoncrypto.c  -o internal/cryptokit/zcommoncrypto.o
          clang -c internal/security/zsecurity.c  -o internal/cryptokit/zsecurity.o

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          category: /language:${{ matrix.language }}
